name: Release & Publish

on:
  schedule:
    - cron: '0 1 * * *' # 1am UTC nightly
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      release_reason:
        description: 'Brief description (prepended to release notes)'
        required: false
        type: string

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Detect code changes (scheduled runs only)
  # ─────────────────────────────────────────────────────────────────────────────
  check-for-changes:
    name: Check for code changes
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
      bump_type: ${{ steps.check.outputs.bump_type }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for code changes since last tag
        id: check
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -z "$LAST_TAG" ]; then
            echo "No previous tag found — treating as first release"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "bump_type=minor" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Only count changes to source code files (not docs/markdown)
          CHANGED=$(git diff --name-only "$LAST_TAG" HEAD -- \
            'frontend/src/**' \
            'backend/src/**' \
            'Dockerfile' \
            'entrypoint.sh' \
            'package.json' \
            'package-lock.json' \
            'frontend/package.json' \
            'backend/package.json')

          if [ -z "$CHANGED" ]; then
            echo "No code changes since $LAST_TAG — skipping release"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "Code changes detected since $LAST_TAG"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"

            # Determine bump type from conventional commits
            COMMITS=$(git log "${LAST_TAG}..HEAD" --format="%s")
            if echo "$COMMITS" | grep -qiE "^(feat|fix)(\(.+\))?!:|BREAKING CHANGE"; then
              echo "bump_type=major" >> "$GITHUB_OUTPUT"
            elif echo "$COMMITS" | grep -qiE "^feat(\(.+\))?:"; then
              echo "bump_type=minor" >> "$GITHUB_OUTPUT"
            else
              echo "bump_type=patch" >> "$GITHUB_OUTPUT"
            fi
          fi

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Bump version, build, push, and release
  # ─────────────────────────────────────────────────────────────────────────────
  release:
    name: Bump version, build & release
    runs-on: ubuntu-latest
    needs: check-for-changes
    # Run on manual dispatch always; on schedule only when code changes detected
    if: >
      github.event_name == 'workflow_dispatch' ||
      needs.check-for-changes.outputs.has_changes == 'true'
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine bump type
        id: bump_type
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "type=${{ github.event.inputs.release_type }}" >> "$GITHUB_OUTPUT"
          else
            echo "type=${{ needs.check-for-changes.outputs.bump_type }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version in all package.json files
        id: bump
        run: |
          BUMP="${{ steps.bump_type.outputs.type }}"

          # Bump root (source of truth), then sync workspaces to the same version
          NEW_VERSION=$(npm version "$BUMP" --no-git-tag-version | tr -d 'v')
          npm version "$NEW_VERSION" --no-git-tag-version -w frontend
          npm version "$NEW_VERSION" --no-git-tag-version -w backend

          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumped to v$NEW_VERSION"

      - name: Generate release notes
        id: notes
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          NEW_VERSION="${{ steps.bump.outputs.new_version }}"

          RANGE="${LAST_TAG:+${LAST_TAG}..HEAD}"
          [ -z "$RANGE" ] && RANGE="HEAD"

          # Categorize commits
          BREAKING=$(git log $RANGE --format="- %s" 2>/dev/null \
            | grep -iE "^- (feat|fix)(\(.+\))?!:|BREAKING CHANGE" || true)
          FEATURES=$(git log $RANGE --format="- %s" 2>/dev/null \
            | grep -iE "^- feat(\(.+\))?:" | grep -v "!" || true)
          FIXES=$(git log $RANGE --format="- %s" 2>/dev/null \
            | grep -iE "^- fix(\(.+\))?:" | grep -v "!" || true)

          {
            if [ -n "${{ github.event.inputs.release_reason }}" ]; then
              echo "**${{ github.event.inputs.release_reason }}"
              echo ""
            fi

            if [ -n "$BREAKING" ]; then
              echo "## 💥 Breaking Changes"
              echo "$BREAKING"
              echo ""
            fi

            if [ -n "$FEATURES" ]; then
              echo "## ✨ Feature Additions"
              echo "$FEATURES"
              echo ""
            fi

            if [ -n "$FIXES" ]; then
              echo "## 🐛 Bug Fixes"
              echo "$FIXES"
              echo ""
            fi

            if [ -z "$BREAKING" ] && [ -z "$FEATURES" ] && [ -z "$FIXES" ]; then
              echo "## 🔧 Changes"
              git log $RANGE --format="- %s" 2>/dev/null | head -20 || true
            fi
          } > release_notes.md

          cat release_notes.md

      - name: Commit version bump and tag
        run: |
          NEW_VERSION="${{ steps.bump.outputs.new_version }}"
          git add package.json frontend/package.json backend/package.json
          git commit -m "chore: bump version to v${NEW_VERSION}"
          git tag "v${NEW_VERSION}"
          git push origin main
          git push origin "v${NEW_VERSION}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: VERSION=${{ steps.bump.outputs.new_version }}
          tags: neuman1812/apex_family_tree:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.new_version }}
          name: v${{ steps.bump.outputs.new_version }}
          body_path: release_notes.md
          make_latest: true
          token: ${{ secrets.GITHUB_TOKEN }}
